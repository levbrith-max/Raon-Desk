name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Find project root and build
        run: |
          # Cherche settings.gradle pour trouver le bon répertoire
          PROJ=$(find . -name "settings.gradle" -not -path "*/build/*" | head -1 | xargs dirname)
          echo "Projet trouvé dans : $PROJ"
          cd "$PROJ"
          gradle assembleDebug --stacktrace --no-daemon

      - name: Find and upload APK
        run: |
          APK=$(find . -name "app-debug.apk" | head -1)
          echo "APK trouvé : $APK"
          cp "$APK" ./app-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GnomeBazziteLauncher-debug
          path: app-debug.apk
          retention-days: 30
