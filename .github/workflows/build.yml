name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # permet de lancer manuellement depuis GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Mettre en cache Gradle pour accélérer les builds suivants
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # 4. Rendre gradlew exécutable
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 5. Compiler l'APK debug (pas besoin de signature)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 6. Uploader l'APK comme artifact téléchargeable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GnomeBazziteLauncher-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # disponible 30 jours

      # Optionnel : build Release non signé aussi
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: GnomeBazziteLauncher-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
